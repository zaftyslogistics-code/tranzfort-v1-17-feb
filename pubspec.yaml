name: tranzfort
description: "TranZfort — India's trucking network. Connect suppliers with truckers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  supabase_flutter: ^2.5.6
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  riverpod_annotation: ^2.3.5
  intl: ^0.20.2
  uuid: ^4.4.0
  google_sign_in: ^6.2.1

  # UI/UX
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0
  flutter_svg: ^2.0.10
  connectivity_plus: ^6.0.3
  cupertino_icons: ^1.0.8

  # Voice & TTS & STT
  flutter_tts: ^4.0.2
  speech_to_text: ^7.0.0

  # On-device AI (LLM, TTS, STT)
  # llm_llamacpp: ^0.1.7  # DISABLED - libomp.so packaging issue on Android
  fllama:  # Alternative llama.cpp wrapper from GitHub
    git:
      url: https://github.com/Telosnex/fllama.git
      ref: main
  # kokoro_tts_flutter: ^0.2.0  # DISABLED - switched to sherpa_onnx + Piper
  sherpa_onnx: ^1.12.25  # Fast TTS (Piper) and STT
  whisper_flutter_new: ^1.0.1

  # Chat voice messages (record + playback)
  record: ^6.0.0
  just_audio: ^0.10.5

  # Permissions
  permission_handler: ^11.3.1

  # SQLite Cache (Phase 9)
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Utilities
  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  archive: ^3.4.10
  collection: ^1.18.0
  geolocator: ^10.1.0
  battery_plus: ^6.0.3

  # GPS Navigation
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  wakelock_plus: ^1.2.8
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.10
  custom_lint: ^0.6.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon-d-2.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icon-d-2.png"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/svg/
    - assets/data/
    - assets/tokenizer_vocab.json
    - assets/lexicon.json
    - assets/us_gold.json
    - assets/us_silver.json
    - assets/prompts/
    - assets/prompts/system/
    - assets/prompts/roles/
    - assets/prompts/tasks/post_load/
    - assets/prompts/tasks/find_loads/
    - assets/prompts/tasks/book_load/
    - assets/prompts/tasks/super_load/
    - assets/prompts/tasks/navigate/
    - assets/prompts/tasks/check_status/
    - assets/prompts/clarify/
    - assets/prompts/errors/
    - assets/prompts/voice/
    - assets/prompts/offline/
    - assets/prompts/admin/
